<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History</title>

  <style>
    body{
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background-image: url(https://depositphotos-blog.s3.eu-west-1.amazonaws.com/uploads/2017/07/Soothing-nature-backgrounds-2.jpg);
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 40px 0;
        background-position: center;
        background-attachment: fixed;
    }

    .container{
        width: 90%;
        max-width: 700px;
        height: 80vh; 
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        overflow-y: auto;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    h2{
      text-align: center;
      margin-bottom: 20px;
      color: #000;
    }

    .card{
        background: rgba(255,255,255,0.25);
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 15px;
        text-align: left;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        transition: transform 0.2s ease;
    }

    .card:hover{
        transform: scale(1.02);
    }

    .label{
        font-weight: bold;
        color: #222;
    }

    .score{
        color: green;
        font-weight: bold;
    }

    .feedback{
        color: #333;
    }

    .date{
        font-size: 12px;
        color: #555;
        margin-top: 8px;
    }

    .empty{
        text-align: center;
        color: #333;
        font-style: italic;
    }

  </style>
</head>

<body>

  <div class="container">
    <h2>Your Attempts</h2>

    {% for row in data %}
    <div class="card">
        <p><span class="label">Question:</span> {{ row.question }}</p>
        <p><span class="label">Your Answer:</span> {{ row.answer }}</p>
        <p><span class="label">Score:</span> <span class="score">{{ row.score }}/10</span></p>
        <p><span class="label">Feedback:</span> <span class="feedback">{{ row.feedback }}</span></p>
        <p class="date">{{ row.created_at }}</p>
    </div>
    {% else %}
        <p class="empty">No attempts yet.</p>
    {% endfor %}
    <form action="/delete_attempts" method="POST" onsubmit="return confirm('Are you sure? This will delete your history permanently')">
        <button style="color: red;">
            Delete History
        </button>
    </form>
  </div>

</body>
</html>
