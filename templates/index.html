<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
    body{
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
    
        background-image: url(https://images.unsplash.com/photo-1546587348-d12660c30c50?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8bmF0dXJhbHxlbnwwfHwwfHx8MA%3D%3D);
        background-size: cover;
    }

    .container{
        width: 100%;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.3);
        backdrop-filter: blur(3px);
        padding: 35px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        text-align: center;
    }

    h2{
        text-align: center;
    }

    input{
        width: 70%;
        padding: 20px;
        margin-top: 10px;
        border-radius: 30px;
        border-width: 10px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        background: transparent;
        color: black;
        backdrop-filter: blur(2px);
    }

    button{
        background: green;
        color: black;
        border: none;
        cursor: pointer;
        padding: 10px;
        width: 30%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 6px;
        border: none
    }

    button:hover{
        background: aqua;
    }

    .toggle {
        margin-top: 15px;
        color: black;
        cursor: pointer;
    }

    .hidden{
        display: none;
    }

    </style>
</head>
<body>
    <div class="container">
        <div id="loginForm" class="toggle">
            <h2><b>Login</b></h2>
            <form action="/login" method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>

                <button type="submit" style="border-radius:20px; padding: 13px;">Login</button>
            </form>
            <br>
            <br><a href="/forgot">Forgot Password?</a>
            <div class="toggle" onclick="showSignup()">Don't have an account? Sign up</div>
        </div>

        <div id="signupForm" class="hidden" class="toggle">
            <h2>Sign up</h2>

            <form action="/signup" method="POST">
                <input type="text" name="username" placeholder="Enter Username" required>
                <input type="text" name="email" placeholder="E-mail" required>
                <input type="password" name="password" placeholder="Enter Password" required>

                <button type="submit">Sign up</button>
            </form>

            <div class="toggle" onclick="showLogin()">Already have an account? Login</div>
        </div>
    </div>

    <script>
        function showSignup(){
            document.getElementById("loginForm").classList.add("hidden");
            document.getElementById("signupForm").classList.remove("hidden")
        }
        function showLogin(){
            document.getElementById("signupForm").classList.add("hidden")
            document.getElementById("loginForm").classList.remove("hidden")
        }
    </script>
</body>
</html>
