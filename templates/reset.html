<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <style>
    body{
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        background-image: url(https://depositphotos-blog.s3.eu-west-1.amazonaws.com/uploads/2017/07/Soothing-nature-backgrounds-2.jpg);
        background-size: cover;
    }

    .container{
        width: 100%;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(3px);
        padding: 35px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        text-align: center;
    }
    h2{
        text-align: center;
    }
    input{
        width: 70%;
        padding: 20px;
        margin-top: 10px;
        border-radius: 30px;
        border-width: 10px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        background: transparent;
        color: black;
        backdrop-filter: blur(2px);
    }
    button{
        background: green;
        color: black;
        border: none;
        cursor: pointer;
        padding: 10px;
        width: 30%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 6px;
        border: none
    }

    button:hover{
        background: aqua;
    }

    </style>
</head>
<body>
    <div class="container">
            <h2><b>Reset Password</b></h2>
            <form action="/new_password" method="POST">
                <input type="password" name="password" placeholder="Password" required><br>
                <input type="password" name="repassword" placeholder="Re-enter Password" required>

                <br><button type="submit" >Reset Password</button>
            </form>
    </div>
</body>
</html>
